name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      # ЗАПУСКАЄМО ТЕСТИ ТІЛЬКИ З ПАПКИ SRC (ігноруємо папку tests з Playwright)
      - name: Run unit tests
        run: npx vitest run src/

      - name: Build project
        run: npm run build
