name: CI/CD Pipeline

on:
  # Запуск при push у основні гілки
  push:
    branches: [ main, develop ]
  # Запуск при створенні Pull Request
  pull_request:
    branches: [ main, develop ]
  # ЦЕЙ РЯДОК ДОЗВОЛЯЄ ЗАПУСТИТИ ПАЙПЛАЙН КНОПКОЮ ВРУЧНУ
  workflow_dispatch: 

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Build for production
        run: npm run build